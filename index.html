<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的單字本</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f6; color: #1a1a1a; min-height: 100vh; }

  /* Layer 1 */
  #layer1 { max-width: 480px; margin: 0 auto; padding: 2rem 1.2rem; }
  .page-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .page-sub { font-size: 13px; color: #888; margin-bottom: 1.8rem; }
  .date-card { background: #fff; border-radius: 14px; padding: 1.1rem 1.3rem; margin-bottom: 10px; cursor: pointer; border: 1.5px solid #ebebeb; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; }
  .date-card:hover { border-color: #1a1a1a; }
  .date-label { font-size: 16px; font-weight: 600; }
  .date-count { font-size: 12px; color: #888; background: #f0f0f0; padding: 3px 10px; border-radius: 99px; }

  /* Layer 2 */
  #layer2 { max-width: 480px; margin: 0 auto; padding: 1.5rem 1.2rem; display: none; }
  .back-btn { font-size: 13px; color: #888; cursor: pointer; margin-bottom: 1.2rem; display: inline-flex; align-items: center; gap: 5px; }
  .back-btn:hover { color: #1a1a1a; }
  .layer2-title { font-size: 20px; font-weight: 600; margin-bottom: 1.2rem; }
  .word-row { background: #fff; border-radius: 12px; padding: 0.9rem 1.1rem; margin-bottom: 8px; cursor: pointer; border: 1.5px solid #ebebeb; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; }
  .word-row:hover { border-color: #1a1a1a; }
  .word-row-en { font-size: 15px; font-weight: 600; }
  .word-row-zh { font-size: 12px; color: #888; }
  .word-row-arrow { color: #ccc; font-size: 16px; }

  /* Layer 3 */
  #layer3 { max-width: 560px; margin: 0 auto; padding: 1.5rem 1.2rem; display: none; }

  /* Word header */
  .word-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .word-title { font-size: 30px; font-weight: 700; }
  .word-freq-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; vertical-align: middle; }
  .freq-high { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
  .freq-mid  { background: #e8f4fd; color: #0a58ca; border: 1px solid #90c4f5; }
  .freq-low  { background: #f0f0f0; color: #888;    border: 1px solid #ddd; }
  .word-phonetic { font-size: 13px; color: #888; margin-top: 5px; margin-bottom: 1.4rem; }

  .section { margin: 1.2rem 0; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #aaa; margin-bottom: 10px; }
  .divider { border: none; border-top: 1px solid #ebebeb; margin: 1.2rem 0; }

  /* Meanings */
  .pos-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: #1a1a1a; color: #fff; margin-right: 6px; text-transform: uppercase; vertical-align: middle; }
  .meaning-block { margin-bottom: 1.2rem; }
  .meaning-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .meaning-zh-main { font-size: 16px; font-weight: 600; line-height: 1.5; display: inline; }
  .meaning-freq { font-size: 10px; padding: 1px 7px; border-radius: 99px; font-weight: 600; }
  .meaning-en-sub { font-size: 12px; color: #888; margin-top: 3px; }
  .example { font-size: 13px; color: #555; font-style: italic; margin-top: 8px; padding-left: 10px; border-left: 2px solid #ddd; line-height: 1.6; }
  .example em { font-style: normal; font-weight: 700; text-decoration: underline; text-decoration-color: #bbb; }

  /* Family */
  .family-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .family-tag { background: #f4f4f2; border-radius: 8px; padding: 6px 12px; font-size: 12px; }
  .family-tag .fw { font-weight: 600; }
  .family-tag .fp { color: #aaa; font-size: 10px; margin-left: 4px; }
  .family-tag .fz { color: #888; font-size: 11px; display: block; margin-top: 2px; }

  /* Collocations */
  .col-grid { display: flex; flex-direction: column; gap: 8px; }
  .col-item { display: flex; gap: 10px; align-items: baseline; font-size: 13px; }
  .col-en { font-weight: 600; min-width: 160px; }
  .col-zh { color: #666; }

  /* Similar */
  .sim-grid { display: flex; flex-direction: column; gap: 8px; }
  .sim-card { background: #f9f9f7; border-radius: 10px; padding: 10px 12px; }
  .sim-top { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
  .sim-word { font-size: 14px; font-weight: 700; }
  .sim-pos { font-size: 10px; color: #aaa; }
  .sim-zh { font-size: 12px; color: #555; font-weight: 500; }
  .sim-diff { font-size: 12px; color: #888; margin-top: 4px; border-left: 2px solid #ddd; padding-left: 8px; line-height: 1.5; }

  /* Lookalikes */
  .look-grid { display: flex; flex-direction: column; gap: 8px; }
  .look-card { background: #f9f9f7; border-radius: 10px; padding: 10px 12px; }
  .look-pair { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .look-word { font-size: 14px; font-weight: 700; }
  .look-vs { font-size: 10px; color: #bbb; background: #ebebeb; padding: 1px 6px; border-radius: 99px; }
  .look-zh { font-size: 12px; color: #555; margin-bottom: 5px; }
  .look-tip { font-size: 12px; color: #888; line-height: 1.5; border-left: 2px solid #ddd; padding-left: 8px; }

  .loading { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<div id="layer1">
  <div class="page-title">📖 我的單字本</div>
  <div class="page-sub">點選日期，查看該次學習的單字</div>
  <div id="date-list"><div class="loading">載入中...</div></div>
</div>

<div id="layer2">
  <div class="back-btn" onclick="goToLayer1()">← 返回</div>
  <div class="layer2-title" id="layer2-title"></div>
  <div id="word-list"></div>
</div>

<div id="layer3">
  <div class="back-btn" onclick="goToLayer2()">← 返回單字列表</div>
  <div id="word-detail"></div>
</div>

<script>
let allWords = [];
let currentDate = null;

// 將 ⭐ 字串轉換成標籤 HTML
function freqBadge(freqStr, extraClass) {
  if (!freqStr) return '';
  const stars = (freqStr.match(/⭐/g) || []).length;
  let cls, label;
  if (stars >= 3)      { cls = 'freq-high'; label = '⭐⭐⭐ 極常見'; }
  else if (stars === 2) { cls = 'freq-mid';  label = '⭐⭐ 常見'; }
  else                  { cls = 'freq-low';  label = '⭐ 較少見'; }
  return `<span class="word-freq-badge ${cls} ${extraClass||''}">${label}</span>`;
}

async function loadWords() {
  try {
    const res = await fetch('words.json?t=' + Date.now());
    allWords = await res.json();
    renderDateList();
  } catch(e) {
    document.getElementById('date-list').innerHTML = '<div class="loading">載入失敗，請重新整理</div>';
  }
}

function getDateGroups() {
  const groups = {};
  allWords.forEach(w => {
    if (!groups[w.date]) groups[w.date] = [];
    groups[w.date].push(w);
  });
  return groups;
}

function renderDateList() {
  const groups = getDateGroups();
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  const dates = Object.keys(groups).sort((a,b) => {
    const [am,ad] = a.split('/').map(Number);
    const [bm,bd] = b.split('/').map(Number);
    return am !== bm ? bm - am : bd - ad;
  });
  dates.forEach(date => {
    const words = groups[date];
    const div = document.createElement('div');
    div.className = 'date-card';
    div.innerHTML = `<div class="date-label">📅 ${date}</div><div class="date-count">${words.length} 個單字</div>`;
    div.onclick = () => goToLayer2(date);
    list.appendChild(div);
  });
}

function goToLayer1() {
  document.getElementById('layer1').style.display = 'block';
  document.getElementById('layer2').style.display = 'none';
  document.getElementById('layer3').style.display = 'none';
}

function goToLayer2(date) {
  currentDate = date || currentDate;
  const groups = getDateGroups();
  const words = groups[currentDate];
  document.getElementById('layer2-title').textContent = `📅 ${currentDate} 的單字`;
  const list = document.getElementById('word-list');
  list.innerHTML = '';
  words.forEach(w => {
    const div = document.createElement('div');
    div.className = 'word-row';
    div.innerHTML = `<div><div class="word-row-en">${w.title}</div><div class="word-row-zh">${w.hint}</div></div><div class="word-row-arrow">›</div>`;
    div.onclick = () => goToLayer3(w.id);
    list.appendChild(div);
  });
  document.getElementById('layer1').style.display = 'none';
  document.getElementById('layer2').style.display = 'block';
  document.getElementById('layer3').style.display = 'none';
  window.scrollTo(0,0);
}

function goToLayer3(wordId) {
  const w = allWords.find(x => x.id === wordId);
  if (!w) return;

  // 標題 + 單字整體常見度
  let html = `<div class="word-header"><span class="word-title">${w.title}</span>${freqBadge(w.frequency)}</div>`;
  html += `<div class="word-phonetic">${w.phonetic}</div>`;

  // Meanings（含各義項常見度）
  html += `<div class="section"><div class="section-label">意思 &amp; 用法</div>`;
  w.meanings.forEach(m => {
    html += `<div class="meaning-block">`;
    html += `<div class="meaning-top"><span class="pos-badge">${m.pos}</span><span class="meaning-zh-main">${m.en}</span>${freqBadge(m.frequency, 'meaning-freq')}</div>`;
    html += `<div class="meaning-en-sub">${m.zh}</div>`;
    const exs = m.examples || m.ex || [];
    exs.forEach(ex => { html += `<div class="example">${ex}</div>`; });
    html += `</div>`;
  });
  html += `</div>`;

  // Family
  if (w.family && w.family.length) {
    html += `<hr class="divider"><div class="section"><div class="section-label">字族</div><div class="family-grid">`;
    w.family.forEach(f => {
      html += `<div class="family-tag"><span class="fw">${f.word}</span><span class="fp">${f.pos}</span><span class="fz">${f.zh}</span></div>`;
    });
    html += `</div></div>`;
  }

  // Collocations（⭐ 已嵌在 en 字串中，直接顯示）
  const cols = w.collocations || w.col || [];
  if (cols.length) {
    html += `<hr class="divider"><div class="section"><div class="section-label">搭配用法</div><div class="col-grid">`;
    cols.forEach(c => {
      html += `<div class="col-item"><span class="col-en">${c.en}</span><span class="col-zh">${c.zh}</span></div>`;
    });
    html += `</div></div>`;
  }

  // Similar（⭐ 已嵌在 zh 字串中，直接顯示）
  const sims = w.similar || w.sim || [];
  if (sims.length) {
    html += `<hr class="divider"><div class="section"><div class="section-label">相似詞</div><div class="sim-grid">`;
    sims.forEach(s => {
      html += `<div class="sim-card"><div class="sim-top"><span class="sim-word">${s.word}</span><span class="sim-pos">${s.pos}</span><span class="sim-zh">${s.zh}</span></div>`;
      if (s.diff) html += `<div class="sim-diff">${s.diff}</div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  // Lookalikes（⭐ 已嵌在 zh 字串中，直接顯示）
  const looks = w.lookalikes || w.look || [];
  if (looks.length) {
    html += `<hr class="divider"><div class="section"><div class="section-label">長得很像的單詞</div><div class="look-grid">`;
    looks.forEach(l => {
      html += `<div class="look-card">`;
      html += `<div class="look-pair"><span class="look-word">${l.a}</span><span class="look-vs">vs</span><span class="look-word">${l.b}</span></div>`;
      html += `<div class="look-zh">${l.zh}</div>`;
      html += `<div class="look-tip">${l.tip}</div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('word-detail').innerHTML = html;
  document.getElementById('layer1').style.display = 'none';
  document.getElementById('layer2').style.display = 'none';
  document.getElementById('layer3').style.display = 'block';
  window.scrollTo(0,0);
}

loadWords();
</script>
</body>
</html>
